  new_issues_discovered:
    - id: "ISS-E2E-002"
      title: "E2E success message not appearing despite PR-003 fix"
      description: |
        The success notification "テストデータの生成が完了しました" does not appear
        in E2E tests even though PR-003's fix (disable auto-close) is present in the code.

        Original hypothesis (PR-003): Message appears but auto-closes too quickly
        Actual finding: Message never appears at all

        This suggests a deeper issue with:
        - State management (React state not triggering re-render)
        - Component lifecycle (Notification unmounting before state update)
        - API response handling (Frontend not processing seed API response correctly)
        - Race condition (Stats refresh interfering with notification render)

      source: "E2E test execution + code inspection"
      priority: "P0 (Blocking)"
      impact: |
        - Blocks E2E test validation
        - Prevents ASM-003 from being upgraded to "confirmed"
        - Blocks production readiness confirmation

      recommended_investigation:
        - step: "Add diagnostic logging"
          action: "console.log in useDashboard.handleGenerate and Dashboard useEffect"
        - step: "Manual testing"
          action: "Run dev server, click generate button, observe if message appears"
        - step: "React DevTools inspection"
          action: "Check if notification state is being set in React state tree"
        - step: "Component lifecycle analysis"
          action: "Verify Dashboard component doesn't unmount/remount during seed"

    - id: "ISS-BACKUP-001"
      title: "Backup/restore API test design issues"
      description: |
        13 tests failing in backup/restore API routes due to pre-existing test design problems:
