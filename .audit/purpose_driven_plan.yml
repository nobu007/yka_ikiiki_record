  - Time-series utilities: Trend direction detection, moving average calculation

  Application service capabilities:
  - analyzeStudentTrend: Create student trend from raw records with date aggregation
  - analyzeClassTrend: Create class trend from multiple student analyses
  - calculateMovingAverage: Smooth time-series data with sliding window
  - detectAnomalies: Identify outliers using standard deviation threshold
  - calculateTrendCorrelation: Measure Pearson correlation between two series
  - Repository integration: Save/retrieve student and class trends

  Presentation component capabilities:
