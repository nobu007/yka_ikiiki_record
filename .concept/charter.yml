version: "1.0"

product_goal:
  north_star: "日本の学校向けに、学生の成長と教室文化を1分間の記録で可視化する教育インフラを提供する（推定）"
  success_metrics:
    - id: "MET-001"
      name: "テストカバレッジ"
      target: "≥ 90%"
      current: "100% (2245 tests passing)"
    - id: "MET-002"
      name: "不変条件準拠率"
      target: "100%"
      current: "100% (20/20 invariants stable)"
    - id: "MET-003"
      name: "単一責務原則準拠"
      target: "100% (全ファイル300行以下)"
      current: "100% (0/308 files over 300 lines)"
  non_goals:
    - "実際のAI/MLモデルの実装（デモ用モックデータのみ）"
    - "本番環境向けの認証・認可システム"
    - "複数の学校向けマルチテナント機能"

