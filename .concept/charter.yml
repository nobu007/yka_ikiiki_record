version: "1.0"

product_goal:
  north_star: "日本の学校向けに、学生の成長と教室文化を1分間の記録で可視化する教育インフラを提供する（推定）"
  success_metrics:
    - id: "MET-001"
      name: "テストカバレッジ"
      target: "≥ 90%"
      current: "99.64% (435 tests passing)"
    - id: "MET-002"
      name: "不変条件準拠率"
      target: "100%"
      current: "100% (0/7 violations)"
    - id: "MET-003"
      name: "単一責務原則準拠"
      target: "100% (全ファイル300行以下)"
      current: "100% (0/133 files)"
  non_goals:
    - "実際のAI/MLモデルの実装（デモ用モックデータのみ）"
    - "本番環境向けの認証・認可システム"
    - "複数の学校向けマルチテナント機能"

milestones:
  - id: "MS-001"
    name: "概念フレームワーク確立"
    intent: ".concept/ ガバナンスシステムを確立し、リポジトリの概念モデルを文書化する"
    deliverables:
      - "ontology.yml - 主要な概念と用語の定義"
      - "mappings.yml - 概念とコードの対応関係"
    acceptance:
      - type: "quality_gate"
        target: "全品質基準（Q1-Q8）を満たす"
    priority: "P0"
    status: "done"

work_policy:
  default_mode: "commit"
  iteration_budget:
    max_cycles: 5
    max_files_changed: 25
  quality_gates:
    must_pass: ["lint", "test"]
