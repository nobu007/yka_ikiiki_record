version: "1.0"

product_goal:
  north_star: "日本の学校向けに、学生の成長と教室文化を1分間の記録で可視化する教育インフラを提供する（推定）"
  success_metrics:
    - id: "MET-001"
      name: "テストカバレッジ"
      target: "≥ 90%"
      current: "100% (1312 tests passing)"
    - id: "MET-002"
      name: "不変条件準拠率"
      target: "100%"
      current: "100% (20/20 invariants stable)"
    - id: "MET-003"
      name: "単一責務原則準拠"
      target: "100% (全ファイル300行以下)"
      current: "100% (0/307 files over 300 lines)"
  non_goals:
    - "実際のAI/MLモデルの実装（デモ用モックデータのみ）"
    - "本番環境向けの認証・認可システム"
    - "複数の学校向けマルチテナント機能"

milestones:
  - id: "MS-001"
    name: "概念フレームワーク確立"
    intent: ".concept/ ガバナンスシステムを確立し、リポジトリの概念モデルを文書化する"
    deliverables:
      - "ontology.yml - 主要な概念と用語の定義"
      - "mappings.yml - 概念とコードの対応関係"
    acceptance:
      - type: "quality_gate"
        target: "全品質基準（Q1-Q8）を満たす"
    priority: "P0"
    status: "done"

  - id: "MS-002"
    name: "E2Eテスト自動化の強化"
    intent: "本番デプロイの代替として、ローカルE2E統合テストを CI/CD パイプラインに統合する"
    deliverables:
      - "test-e2e-local.sh - ローカルE2E統合テストスクリプト"
      - "package.json に test:e2e:local スクリプトを追加"
      - "scripts/README.md - ドキュメント整備"
    acceptance:
      - type: "quality_gate"
        target: "全E2Eテストが自動実行され、本番デプロイの妥当性を検証する"
    constitution_links:
      - "§7 TESTING MANDATES - E2E tests required"
      - "§9 CI/CD REQUIREMENTS - Automated testing in pipeline"
    priority: "P2"
    status: "done"
    progress_note: "Completed 2026-03-29. All deliverables implemented and validated. E2E script functional with npm run test:e2e:local."

  - id: "MS-003"
    name: "データエクスポート機能の実装"
    intent: "統計データをCSV/Excel形式でエクスポートする機能を追加し、教育現場でのデータ利便性を向上させる"
    deliverables:
      - "CSVエクスポートAPIエンドポイント (/api/export)"
      - "ExcelエクスポートAPIエンドポイント (/api/export)"
      - "エクスポートユーティリティ (src/lib/export/)"
      - "エクスポート機能のE2Eテスト"
      - "UIコンポーネントへのエクスポートボタン追加"
    acceptance:
      - type: "quality_gate"
        target: "全フォーマットでデータが正しくエクスポートされ、テストが通過する"
    constitution_links:
      - "§7 TESTING MANDATES - All features must have tests"
      - "§3 TYPE SUPREMACY - Zod validation for export data"
    priority: "P2"
    status: "done"
    progress_note: "Completed 2026-03-29. All 6 deliverables implemented: CSV/Excel utilities, API endpoints, E2E tests (33 passing), ExportButton component with 14 tests, UI integration in DataVisualization."

  - id: "MS-004"
    name: "データページネーション機能の実装"
    intent: "大量データ時の表示速度改善のため、ページネーション機能を追加し、ユーザー体験を向上させる"
    deliverables:
      - "ページネーションユーティリティ (src/utils/pagination.ts)"
      - "ページネーション関数のテスト (src/utils/pagination.test.ts)"
      - "PaginationResult型の定義 (src/types/pagination.ts)"
      - "PaginationControl UIコンポーネント (src/components/common/PaginationControl.tsx)"
      - "PaginationControlコンポーネントのテスト (src/components/common/PaginationControl.test.tsx)"
    acceptance:
      - type: "quality_gate"
        target: "全ページネーション関数のテストが通過し、カバレッジ100%を達成"
    constitution_links:
      - "§7 TESTING MANDATES - All features must have tests"
      - "§3 TYPE SUPREMACY - Full TypeScript type safety"
      - "§5 PERFORMANCE REQUIREMENTS - React component optimization"
    priority: "P2"
    status: "active"
    progress_note: "In progress 2026-03-29. T-001 completed (pagination utilities), T-002 completed (PaginationControl component). 1 remaining: T-003 (DataVisualization integration)."

work_policy:
  default_mode: "commit"
  iteration_budget:
    max_cycles: 5
    max_files_changed: 25
  quality_gates:
    must_pass: ["lint", "test"]
