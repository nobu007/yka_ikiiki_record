    intent: ".concept/ ガバナンスシステムを確立し、リポジトリの概念モデルを文書化する"
    deliverables:
      - "ontology.yml - 主要な概念と用語の定義"
      - "mappings.yml - 概念とコードの対応関係"
    acceptance:
      - type: "quality_gate"
        target: "全品質基準（Q1-Q8）を満たす"
    priority: "P0"
    status: "done"

