# PROJECT INVARIANTS
# Immutable architectural constraints that MUST never be violated

version: 1.1.0
last_updated: 2026-03-08

invariants:
  # ARCHITECTURAL INVARIANTS
  - id: INV-ARCH-001
    name: Single_Responsibility_Enforcement
    category: architecture
    severity: CRITICAL
    description: Every class/module must have exactly one reason to change (INCLUDING TEST FILES)
    constraint: "Maximum 1 public responsibility per module - applies to ALL files without exception"
    validation: "File line count < 300 for ALL files (src/**/*.ts, src/**/*.tsx) - no test file exclusions"
    rationale: "Prevents god objects, maintains modularity, ensures test file governance"

  - id: INV-ARCH-002
    name: Layer_Separation
    category: architecture
    severity: CRITICAL
    description: Domain, Application, and Infrastructure layers must never mix
    constraint: "No cross-layer imports (Domain ← Infrastructure prohibited)"
    validation: "Dependency graph validation on commit"
    rationale: "Maintains architectural integrity"

  - id: INV-ARCH-003
    name: Reference_Based_Options_Propagation
    category: architecture
    severity: CRITICAL
    description: Multi-layer options must use reference passing, never deepcopy
    constraint: "Forbidden: deepcopy(options), copy.deepcopy(options)"
    validation: "Grep check for deepcopy in options handling"
    rationale: "Ensures parameter visibility across all layers"

  # CODE QUALITY INVARIANTS
  - id: INV-QUAL-001
    name: TypeScript_Strict_Mode
    category: quality
    severity: CRITICAL
    description: All TypeScript code must comply with strict type checking
    constraint: "No 'any' types without explicit justification, no implicit any"
    validation: "TypeScript compilation with strict mode must pass"
    rationale: "Maintains type safety across the codebase"
    related_terms: ["CleanArchitecture", "DomainLayer"]

  - id: INV-QUAL-002
    name: Fixed_Filename_Policy
    category: quality
    severity: CRITICAL
    description: No timestamped or date-stamped filenames
    constraint: "Fixed paths only, overwrite is mandatory"
    validation: "find . -name '*_[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]*' = 0"
    rationale: "Prevents report explosion, enforces singularity"

  - id: INV-QUAL-003
    name: Common_Process_Reuse
    category: quality
    severity: HIGH
    description: Must reuse existing utilities before implementing new ones
    constraint: "95%+ common code reuse rate required"
    validation: "Implementation requires pre-search grep for existing solutions"
    rationale: "Prevents wheel reinvention"

  # TESTING INVARIANTS
  - id: INV-TEST-001
    name: Test_Coverage_Floor
    category: testing
    severity: HIGH
    description: All production code must have test coverage
    constraint: "90%+ coverage required for new code"
    validation: "Coverage report validation on commit"
    rationale: "Maintains regression safety"

  - id: INV-TEST-002
    name: Dual_Verification_Required
    category: testing
    severity: HIGH
    description: Tests must verify both new file creation AND existing file skip
    constraint: "Both creation and skip scenarios must be tested"
    validation: "Test audit for file state transitions"
    rationale: "Prevents 'works once' failures"

  # DOMAIN INVARIANTS
  - id: INV-DOM-001
    name: Emotion_Value_Range
    category: domain
    severity: CRITICAL
    description: Emotion scores must always be within valid range
    constraint: "Emotion values must be between 1.0 and 5.0 inclusive"
    validation: "All Record entities and generated stats enforce 1.0-5.0 range"
    rationale: "Emotion scores are normalized to 1-5 scale for consistency"
    related_terms: ["Record", "Stats", "EmotionGenerator"]

  - id: INV-DOM-002
    name: Stats_Structure_Completeness
    category: domain
    severity: CRITICAL
    description: Stats entity must contain all required subsections
    constraint: "Stats must have overview, monthlyStats, studentStats, dayOfWeekStats, emotionDistribution, timeOfDayStats"
    validation: "StatsRepository and StatsService ensure complete structure"
    rationale: "Dashboard and UI depend on complete stats structure"
    related_terms: ["Stats", "StatsRepository", "StatsService"]

  - id: INV-DOM-003
    name: Record_Optional_Fields
    category: domain
    severity: HIGH
    description: Record entity must allow optional comment and metadata
    constraint: "id, comment, createdAt, updatedAt are optional; emotion, date, student are required"
    validation: "Record.test.ts verifies creation with and without optional fields"
    rationale: "Supports flexible record creation and persistence lifecycle"
    related_terms: ["Record"]

  # RESILIENCE INVARIANTS
  - id: INV-RES-001
    name: CircuitBreaker_State_Transitions
    category: resilience
    severity: CRITICAL
    description: CircuitBreaker must transition through CLOSED → OPEN → HALF_OPEN → CLOSED
    constraint: "State changes only on failure threshold or timeout expiration"
    validation: "CircuitBreaker.test.ts verifies state transitions and reset behavior"
    rationale: "Prevents cascading failures in distributed systems"
    related_terms: ["CircuitBreaker", "AppError"]

  - id: INV-RES-002
    name: CircuitBreaker_Failure_Counting
    category: resilience
    severity: HIGH
    description: CircuitBreaker must accurately track failures and reset on success
    constraint: "Failure count resets to 0 on successful operation or manual reset"
    validation: "CircuitBreaker tracks failureCount and resets appropriately"
    rationale: "Accurate failure tracking enables correct circuit state management"
    related_terms: ["CircuitBreaker"]

  # REPOSITORY INVARIANTS
  - id: INV-REP-001
    name: Repository_Interface_Contract
    category: repository
    severity: CRITICAL
    description: Repository implementations must fulfill complete interface contract
    constraint: "All repository methods must be async and return proper types"
    validation: "StatsRepository.contract.test.ts enforces interface compliance"
    rationale: "Ensures swappable repository implementations (Prisma, Mock)"
    related_terms: ["StatsRepository", "IRecordRepository", "PrismaRecordRepository", "MockStatsRepository"]

  - id: INV-REP-002
    name: Repository_Data_Isolation
    category: repository
    severity: HIGH
    description: Repository operations must not leak data between requests
    constraint: "Each repository call must be independent and isolated"
    validation: "Repository tests verify no state leakage between operations"
    rationale: "Prevents data corruption in concurrent scenarios"
    related_terms: ["StatsRepository", "IRecordRepository"]

  # UTILITY INVARIANTS
  - id: INV-UTIL-001
    name: Math_Function_Boundary_Conditions
    category: utility
    severity: HIGH
    description: Math utilities must handle edge cases (empty arrays, equal bounds, out-of-range)"
    constraint: "clamp, average, and other math functions handle edge cases gracefully"
    validation: "statsCalculator.basic.test.ts verifies boundary conditions"
    rationale: "Prevents NaN and undefined errors in calculations"
    related_terms: ["StatsCalculator"]

  - id: INV-UTIL-002
    name: Average_Empty_Array_Handling
    category: utility
    severity: MEDIUM
    description: Average function must return 0 for empty arrays
    constraint: "average([]) === 0, not NaN or undefined"
    validation: "statsCalculator.basic.test.ts verifies empty array behavior"
    rationale: "Provides predictable behavior for empty datasets"
    related_terms: ["StatsCalculator"]

  - id: INV-UTIL-003
    name: Clamp_Function_Range_Enforcement
    category: utility
    severity: HIGH
    description: Clamp function must enforce value boundaries
    constraint: "clamp(value, min, max) returns value when within range, min when below, max when above"
    validation: "statsCalculator.basic.test.ts verifies clamp behavior with edge cases"
    rationale: "Ensures predictable value range enforcement"
    related_terms: ["StatsCalculator"]

  # LOGGING INVARIANTS
  - id: INV-LOG-001
    name: Structured_Logging_Required_Fields
    category: logging
    severity: HIGH
    description: All log entries must contain required structured fields
    constraint: "Log entries must have: level, category, operation, timestamp, correlationId, metadata, visibility"
    validation: "structured-logger.test.ts verifies all required fields are present"
    rationale: "Ensures log entries are queryable and traceable"
    related_terms: ["StructuredLogger"]

  - id: INV-LOG-002
    name: Log_Level_Visibility_Mapping
    category: logging
    severity: MEDIUM
    description: Log levels must map to appropriate visibility settings
    constraint: "DEBUG level maps to DEBUG visibility; INFO/WARN/ERROR/FATAL map to INTERNAL"
    validation: "structured-logger.test.ts verifies visibility mapping for convenience methods"
    rationale: "Prevents sensitive information leakage in debug logs"
    related_terms: ["StructuredLogger"]

  - id: INV-LOG-003
    name: Log_Correlation_ID_Tracking
    category: logging
    severity: HIGH
    description: All log entries must have unique correlation IDs for request tracing
    constraint: "Every log entry must include a correlationId field"
    validation: "structured-logger.correlation.test.ts verifies correlation ID generation"
    rationale: "Enables distributed tracing and debugging"
    related_terms: ["StructuredLogger"]

  - id: INV-LOG-004
    name: Log_Size_Management
    category: logging
    severity: MEDIUM
    description: Logger must enforce maximum log size limits
    constraint: "Logger must enforce max_logs limit and implement FIFO eviction"
    validation: "structured-logger.sizemanagement.test.ts verifies size limits"
    rationale: "Prevents memory leaks from unbounded log growth"
    related_terms: ["StructuredLogger"]

  # TIMEOUT INVARIANTS
  - id: INV-TIME-001
    name: Timeout_Wrapper_Standard_Durations
    category: timeout
    severity: HIGH
    description: Timeout wrappers must use predefined standard durations for different operation types
    constraint: "API=10s, Database=5s, Command=30s, File=15s, E2E=60s"
    validation: "timeout.test.ts verifies DEFAULT_TIMEOUTS values"
    rationale: "Provides consistent timeout behavior across operations"
    related_terms: ["APITimeout", "TimeoutError"]

  - id: INV-TIME-002
    name: Timeout_Error_Propagation
    category: timeout
    severity: HIGH
    description: Timeout wrappers must preserve operation errors when they occur before timeout
    constraint: "Operation errors must be propagated, not replaced by TimeoutError"
    validation: "timeout.test.ts verifies error propagation before timeout"
    rationale: "Prevents masking actual operation failures with timeout errors"
    related_terms: ["TimeoutError", "APITimeout"]

  # LOOP DETECTION INVARIANTS
  - id: INV-LOOP-001
    name: Loop_Detection_Maximum_Iterations
    category: loop_detection
    severity: CRITICAL
    description: Loop detectors must enforce maximum iteration limits
    constraint: "Default max iterations = 1000; custom limits allowed but must be enforced"
    validation: "loop-detector.test.ts verifies InfiniteLoopError thrown on exceeded iterations"
    rationale: "Prevents infinite loops from hanging the application"
    related_terms: ["LoopDetector", "InfiniteLoopError"]

  - id: INV-LOOP-002
    name: Loop_Detection_Per_Operation_Tracking
    category: loop_detection
    severity: HIGH
    description: Loop detectors must track iteration counts independently for each operation ID
    constraint: "Each operation ID has independent iteration counter"
    validation: "loop-detector.test.ts verifies different operation IDs don't interfere"
    rationale: "Prevents false positives from multiple concurrent loops"
    related_terms: ["LoopDetector"]

  - id: INV-LOOP-003
    name: Loop_Detection_Time_Window_Reset
    category: loop_detection
    severity: MEDIUM
    description: Loop detectors must reset counters after time window expires
    constraint: "Counters reset after time window (default 30000ms)"
    validation: "loop-detector.test.ts verifies counter reset after timeout"
    rationale: "Allows legitimate long-running operations to complete"
    related_terms: ["LoopDetector"]

  # MEMORY MONITORING INVARIANTS
  - id: INV-MEM-001
    name: Memory_Monitor_Lifecycle_Management
    category: memory
    severity: HIGH
    description: Memory monitors must support proper start/stop/destroy lifecycle
    constraint: "Multiple start calls must be idempotent; destroy must cleanup resources"
    validation: "memory-monitor.lifecycle.test.ts verifies lifecycle methods"
    rationale: "Prevents resource leaks and duplicate monitoring"
    related_terms: ["MemoryMonitor"]

  - id: INV-MEM-002
    name: Memory_Monitor_Usage_Calculation
    category: memory
    severity: MEDIUM
    description: Memory monitors must provide accurate heap usage metrics
    constraint: "Must return heapUsed, heapTotal, external, arrayBuffers, rss"
    validation: "memory-monitor.lifecycle.test.ts verifies usage object structure"
    rationale: "Enables accurate memory tracking and alerting"
    related_terms: ["MemoryMonitor"]

  # GLOBAL SINGLETONS INVARIANTS
  - id: INV-SINGLETON-001
    name: Global_Resilience_Instances
    category: resilience
    severity: MEDIUM
    description: Core resilience utilities must provide global singleton instances
    constraint: "globalCircuitBreaker, globalLogger, globalLoopDetector, globalMemoryMonitor must be available"
    validation: "Resilience test suites verify global instances exist"
    rationale: "Provides shared resilience state across application"
    related_terms: ["CircuitBreaker", "StructuredLogger", "LoopDetector", "MemoryMonitor"]

  # WORKFLOW INVARIANTS
  - id: INV-WORK-001
    name: SDEC_Cycle_Mandatory
    category: workflow
    severity: CRITICAL
    description: All changes must follow Spec-Data-Eval-Change cycle
    constraint: "No implementation without evidence collection"
    validation: "Commit messages must reference evidence"
    rationale: "Prevents assumption-based development"

  - id: INV-WORK-002
    name: Clean_Git_State
    category: workflow
    severity: MEDIUM
    description: Working directory must be clean after feature completion
    constraint: "No uncommitted changes after task completion"
    validation: "git status --porcelain = 0"
    rationale: "Maintains reproducibility"

violation_handling:
  critical:
    action: "BLOCK_COMMIT"
    message: "CRITICAL INVARIANT VIOLATION - Fix required before commit"
  high:
    action: "WARN_REQUIRE_FIX"
    message: "HIGH SEVERITY VIOLATION - Fix strongly recommended"
  medium:
    action: "LOG_WARN"
    message: "MEDIUM SEVERITY VIOLATION - Address in next iteration"

monitoring:
  automated_checks:
    - name: typescript_strict_check
      command: "npx tsc --noEmit --strict 2>&1 | grep -c 'error TS'"
      threshold: 0
      note: "INV-QUAL-001: TypeScript strict mode compliance"
    - name: date_filename_check
      command: "find . -name '*_[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]*' | wc -l"
      threshold: 0
      note: "INV-QUAL-002: No timestamped filenames"
    - name: inv_arch_001_srp_check
      command: "find src -name '*.tsx' -o -name '*.ts' | xargs wc -l | sort -rn | head -1 | awk '{print ($1 > 300) ? 1 : 0}'"
      threshold: 0
      note: "INV-ARCH-001: ALL files including test files must be < 300 lines"
