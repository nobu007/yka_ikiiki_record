version: "0.3"

canonical_terms:
  Record:
    id: "TERM-001"
    layer: "core"
    status: "stable"
    definition: "学生の感情記録を表すドメインエンティティ。日時、学生ID、感情スコア、コメントを含む"
    synonyms: ["EmotionRecord", "StudentRecord"]
    boundaries:
      includes: ["日時", "学生ID", "感情スコア(0-100)", "オプションのコメント"]
      excludes: ["集計統計", "複数学生のデータ"]
    related_terms: ["Stats", "StatsOverview"]
    evidence:
      - source: "src/domain/entities/Record.ts"
        quote: "export type Record = RecordType"

